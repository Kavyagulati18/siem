<!DOCTYPE html>
<html>
<head>
<title>CyberPulse Login</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #0f172a;
}

.glass {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
}

</style>
</head>

<body class="flex items-center justify-center h-screen text-white">

<!-- Window -->
<div class="w-[360px] glass rounded-2xl p-6 shadow-xl">

    <!-- Mac Controls -->
    <div class="flex gap-2 mb-4">
        <div class="w-3 h-3 bg-red-500 rounded-full"></div>
        <div class="w-3 h-3 bg-yellow-400 rounded-full"></div>
        <div class="w-3 h-3 bg-green-500 rounded-full"></div>
    </div>

    <h2 class="text-xl font-semibold mb-6">🔐 CyberPulse Access</h2>

    <form method="POST" class="space-y-4">
        <input type="text" name="username" placeholder="Username"
        class="w-full p-3 rounded-lg bg-white/10 border border-white/10 focus:outline-none focus:ring-2 focus:ring-white/20">

        <input type="password" name="password" placeholder="Password"
        class="w-full p-3 rounded-lg bg-white/10 border border-white/10 focus:outline-none focus:ring-2 focus:ring-white/20">

        <button class="w-full bg-white text-black p-3 rounded-lg font-medium hover:opacity-90 transition">
            Enter System
        </button>
    </form>

    <p class="text-xs text-gray-400 mt-4 text-center">
        Authorized Access Only
    </p>

</div>

</body>
</html>
